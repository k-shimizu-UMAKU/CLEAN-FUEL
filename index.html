<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CLEAN FUEL | 内臓守護チェッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #F4F2EC; min-height: 100vh; color: #1a1a1a;
    -webkit-tap-highlight-color: transparent;
  }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 48px; }

  /* ── ヘッダー ── */
  .header {
    background: linear-gradient(150deg, #162B20 0%, #1F4A32 60%, #2A6644 100%);
    padding: 24px 20px 20px; position: sticky; top: 0; z-index: 10;
  }
  .logo-row { display: flex; align-items: center; gap: 14px; }
  .logo-shield {
    width: 48px; height: 48px; background: rgba(255,255,255,0.13);
    border-radius: 14px; display: flex; align-items: center;
    justify-content: center; font-size: 26px; flex-shrink: 0;
  }
  .logo-main {
    font-family: 'Montserrat', sans-serif; color: #fff;
    font-size: 22px; font-weight: 900; letter-spacing: 4px; line-height: 1;
  }
  .logo-sub { color: #85C99A; font-size: 10px; letter-spacing: 1.5px; margin-top: 5px; }

  /* ── メイン ── */
  .main { padding: 20px 16px 0; }

  /* ── タブ ── */
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tab {
    flex: 1; padding: 13px 8px; border: 2px solid #DDD8CE;
    border-radius: 14px; background: #fff; cursor: pointer;
    font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    color: #888; font-weight: 700; transition: all 0.2s; letter-spacing: 0.5px;
  }
  .tab.active { border-color: #1F4A32; background: #1F4A32; color: #fff; }

  /* ── カード ── */
  .card {
    background: #fff; border-radius: 18px; padding: 22px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.07); margin-bottom: 16px;
  }

  /* ── アップロードゾーン ── */
  .upload-zone { text-align: center; padding: 24px 16px; }
  .upload-emoji { font-size: 52px; margin-bottom: 10px; }
  .upload-title { font-size: 15px; color: #444; font-weight: 700; margin-bottom: 6px; }
  .upload-hint  { font-size: 12px; color: #AAA; margin-bottom: 24px; line-height: 1.7; }
  .btn-row      { display: flex; gap: 10px; justify-content: center; }

  /*
   * ★ モバイル対応 ファイル入力
   *   display:none / visibility:hidden は iOS Safari で
   *   label クリックが効かなくなるため使用禁止。
   *   代わりに「見えないが存在する」状態：
   *   position:absolute + width/height:1px + opacity:0
   */
  .file-input {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  /* label をボタンとして表示 */
  .btn-file {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; padding: 14px 22px; border-radius: 14px;
    font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; -webkit-user-select: none; user-select: none;
    transition: opacity 0.15s;
  }
  .btn-file:active { opacity: 0.7; }
  .btn-camera  { background: #1F4A32; color: #fff; }
  .btn-gallery { background: #EEE9E0; color: #444; }

  /* ── プレビュー ── */
  .preview-wrap { position: relative; text-align: center; }
  .preview-img  {
    max-width: 100%; max-height: 240px; border-radius: 12px;
    object-fit: contain; display: block; margin: 0 auto;
  }
  .btn-reset {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.55); color: #fff; border: none;
    border-radius: 8px; padding: 6px 12px; cursor: pointer;
    font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
  }

  /* ── テキスト入力 ── */
  .input-label {
    display: block; font-size: 12px; font-weight: 900; color: #1F4A32;
    margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase;
  }
  .textarea {
    width: 100%; border: 1.5px solid #DDD8CE; border-radius: 12px;
    padding: 14px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    resize: vertical; outline: none; line-height: 1.7; color: #333; background: #FAFAF8;
  }
  .textarea:focus { border-color: #1F4A32; }

  /* ── 実行ボタン ── */
  .btn-analyze {
    width: 100%; background: linear-gradient(135deg, #162B20 0%, #2A6644 100%);
    color: #fff; border: none; border-radius: 18px; padding: 19px;
    font-size: 16px; font-family: 'Noto Sans JP', sans-serif; font-weight: 900;
    cursor: pointer; letter-spacing: 3px; margin-bottom: 22px;
    box-shadow: 0 6px 24px rgba(26,70,48,0.35); transition: opacity 0.2s;
  }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── ローディング ── */
  .loading { text-align: center; padding: 32px; }
  .loading-spinner {
    font-size: 36px; display: block; margin-bottom: 12px;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; font-weight: 700; color: #555; letter-spacing: 1px; }

  /* ── エラー ── */
  .error-card {
    background: #FEF2F2; border: 1px solid #FECACA; border-radius: 14px;
    padding: 16px; color: #991B1B; font-size: 13px; margin-bottom: 16px; line-height: 1.6;
  }

  /* ── 結果 ── */
  .result-area { display: flex; flex-direction: column; gap: 14px; }
  .status-banner {
    border-radius: 18px; padding: 20px 22px;
    display: flex; align-items: center; gap: 16px; color: #fff;
  }
  .status-clean { background: linear-gradient(135deg,#166534,#15803D); }
  .status-high  { background: linear-gradient(135deg,#7F1D1D,#B91C1C); }
  .status-mid   { background: linear-gradient(135deg,#78350F,#B45309); }
  .status-icon  { font-size: 38px; flex-shrink: 0; }
  .status-title { font-size: 15px; font-weight: 900; letter-spacing: 0.5px; line-height: 1.3; }
  .status-sub   { font-size: 11px; opacity: 0.75; margin-top: 5px; }
  .additive-card {
    background: #fff; border-radius: 18px; padding: 20px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06); border-left: 5px solid;
  }
  .add-header  { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .add-icon    { font-size: 30px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
  .add-meta    { flex: 1; min-width: 0; }
  .add-name    { font-size: 18px; font-weight: 900; line-height: 1.2; }
  .add-exact   { font-size: 11px; color: #999; margin-top: 3px; }
  .level-badge {
    color: #fff; font-size: 10px; font-weight: 900; padding: 4px 10px;
    border-radius: 20px; white-space: nowrap; letter-spacing: 0.5px;
    flex-shrink: 0; margin-top: 2px;
  }
  .organ-tag   {
    background: #F5F2EC; border-radius: 8px; padding: 8px 14px;
    font-size: 12px; color: #666; margin-bottom: 12px;
    display: inline-flex; gap: 6px; align-items: center;
  }
  .damage-text  { font-size: 13px; color: #333; line-height: 1.7; margin-bottom: 14px; }
  .recovery-box {
    background: linear-gradient(135deg,#ECFDF5,#F0FDF4);
    border-radius: 14px; padding: 14px 16px; border: 1px solid #BBF7D0;
  }
  .recovery-label {
    font-size: 10px; font-weight: 900; color: #166534;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
  }
  .recovery-text { font-size: 13px; color: #15803D; line-height: 1.75; }
  .clean-card  {
    background: #fff; border-radius: 18px; padding: 28px 24px;
    text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    border: 2px solid #BBF7D0;
  }
  .clean-icon  { font-size: 52px; margin-bottom: 12px; }
  .clean-title { font-size: 17px; font-weight: 900; color: #166534; margin-bottom: 8px; }
  .clean-text  { font-size: 13px; color: #555; line-height: 1.7; }

  /* ── フッター ── */
  .footer { text-align: center; padding: 24px 16px 0; color: #BBB; font-size: 11px; }
  .footer-brand { font-weight: 700; color: #888; letter-spacing: 1px; }

  /* ── 履歴パネル ── */
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .history-title { font-size: 14px; font-weight: 900; color: #1F4A32; letter-spacing: 1px; }
  .btn-clear-all {
    background: none; border: 1px solid #DDD; border-radius: 8px;
    padding: 6px 12px; font-size: 11px; color: #999; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-clear-all:active { background: #F5F5F5; }

  .history-empty { text-align: center; padding: 40px 16px; color: #BBB; }
  .history-empty-icon { font-size: 40px; margin-bottom: 10px; }
  .history-empty-text { font-size: 13px; line-height: 1.7; }

  /* 履歴カード */
  .hist-card {
    background: #fff; border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    margin-bottom: 12px; overflow: hidden;
    border-left: 4px solid;
    cursor: pointer;
  }
  .hist-summary {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
  }
  .hist-status-dot {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .dot-clean  { background: #DCFCE7; }
  .dot-danger { background: #FEE2E2; }
  .dot-warn   { background: #FEF3C7; }
  .hist-meta  { flex: 1; min-width: 0; }
  .hist-product { font-size: 13px; font-weight: 900; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-date    { font-size: 11px; color: #AAA; margin-top: 2px; }
  .hist-badges  { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .hist-badge   {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; color: #fff;
  }
  .hist-badge-clean { background: #22C55E; }
  .hist-chevron { font-size: 14px; color: #CCC; flex-shrink: 0; transition: transform 0.2s; }
  .hist-chevron.open { transform: rotate(90deg); }

  /* 展開された詳細 */
  .hist-detail {
    border-top: 1px solid #F0EDE8;
    padding: 14px 16px 16px;
    display: none;
  }
  .hist-detail.open { display: block; }
  .hist-additive-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px dashed #EEE;
  }
  .hist-additive-row:last-child { border-bottom: none; }
  .hist-add-icon  { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .hist-add-info  { flex: 1; }
  .hist-add-name  { font-size: 13px; font-weight: 900; }
  .hist-add-exact { font-size: 11px; color: #999; margin-top: 1px; }
  .hist-recovery  {
    background: #F0FDF4; border-radius: 10px;
    padding: 10px 12px; margin-top: 8px;
    font-size: 12px; color: #15803D; line-height: 1.6;
  }
  .hist-clean-row {
    text-align: center; padding: 12px;
    font-size: 13px; color: #166534; font-weight: 700;
  }
  .hist-delete-btn {
    width: 100%; margin-top: 12px;
    background: none; border: 1px solid #EEE; border-radius: 8px;
    padding: 8px; font-size: 12px; color: #CCC; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .hist-delete-btn:active { background: #FEF2F2; color: #EF4444; border-color: #FECACA; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <header class="header">
    <div class="logo-row">
      <div class="logo-shield">🛡️</div>
      <div>
        <div class="logo-main">CLEAN FUEL</div>
        <div class="logo-sub">内臓守護チェッカー for RUIKALOG</div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- タブ -->
    <div class="tabs">
      <button class="tab active" id="tab-camera"  onclick="switchTab('camera')">📷 写真で判定</button>
      <button class="tab"        id="tab-text"    onclick="switchTab('text')">✏️ テキスト入力</button>
      <button class="tab"        id="tab-history" onclick="switchTab('history')">📋 履歴</button>
    </div>

    <!-- 写真パネル -->
    <div id="panel-camera" class="card">

      <div id="upload-zone" class="upload-zone">
        <div class="upload-emoji">📸</div>
        <div class="upload-title">原材料表示を撮影してください</div>
        <div class="upload-hint">コンビニ商品の原材料表示を撮影した写真を<br>添付してください</div>

        <div class="btn-row">
          <button class="btn-file btn-camera" onclick="document.getElementById('input-gallery').click()">
            🖼 画像ファイルを添付
          </button>
          <input id="input-gallery" type="file" accept="image/*"
                 style="display:none" onchange="handleFile(this)">
        </div>

        <!-- GitHub Pages など HTTPS でホストした場合のみ動作します -->
        <!-- Claude.ai のプレビュー画面はiframe制限のため動作しません -->
      </div>

      <div id="preview-zone" class="preview-wrap hidden">
        <img id="preview-img" class="preview-img" src="" alt="原材料プレビュー">
        <button class="btn-reset" onclick="resetImage()">✕ 撮り直す</button>
      </div>

    </div>

    <!-- テキストパネル -->
    <div id="panel-text" class="card hidden">
      <label class="input-label">原材料テキストを貼り付け</label>
      <textarea id="text-input" class="textarea" rows="5"
        placeholder="例）小麦粉、砂糖、食塩、ソルビン酸K、アスパルテーム・L-フェニルアラニン化合物、亜硝酸Na..."></textarea>
    </div>

    <!-- 履歴パネル -->
    <div id="panel-history" class="hidden">
      <div class="history-header">
        <div class="history-title">📋 チェック履歴</div>
        <button class="btn-clear-all" onclick="clearAllHistory()">🗑 全削除</button>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- 実行ボタン -->
    <button class="btn-analyze" id="btn-analyze" onclick="analyze()" disabled>
      🛡️　添加物チェック実行
    </button>

    <!-- ローディング -->
    <div id="loading" class="loading hidden">
      <span class="loading-spinner">⚙️</span>
      <div class="loading-text">AIが原材料を解析しています...</div>
    </div>

    <!-- エラー -->
    <div id="error-card" class="error-card hidden"></div>

    <!-- 結果 -->
    <div id="results" class="result-area hidden"></div>

  </main>

  <footer class="footer">
    <div class="footer-brand">RUIKALOG ATHLETE PERFORMANCE SYSTEM</div>
    <div style="margin-top:4px;opacity:0.7">Powered by Claude AI × Umaku Co., Ltd.</div>
  </footer>

</div>

<script>
/* ============================================================
   ▼▼▼ 管理者設定：APIキーをここに貼り付けてください ▼▼▼
   Anthropic Console (console.anthropic.com) で発行したキーを
   'YOUR_ANTHROPIC_API_KEY_HERE' の部分と差し替えてください。
   ユーザーには入力画面は表示されません。
   ============================================================ */
const API_KEY = 'YOUR_ANTHROPIC_API_KEY_HERE';

/* ============================================================
   添加物ブラックリスト
   ============================================================ */
const BLACKLIST = {
  "リン酸塩": {
    aliases: ["リン酸","ポリリン酸","メタリン酸","ピロリン酸","リン酸Na","リン酸K","リン酸Ca","リン酸塩"],
    organ: "腎臓 · 骨", level: "HIGH", color: "#C0392B", icon: "🦴",
    damage: "血液中のリン濃度が急上昇。腎臓が酷使され、骨からカルシウムを奪い骨密度低下・怪我リスクが上昇します。",
    recovery: "💧 水分を多めに摂り、バナナ（カリウム）を一緒に食べてリンの排泄を促しましょう。"
  },
  "人工甘味料": {
    aliases: ["アスパルテーム","スクラロース","アセスルファムK","アセスルファムカリウム","サッカリン","ネオテーム","アドバンテーム"],
    organ: "肝臓 · 腸 · 副腎", level: "HIGH", color: "#C0392B", icon: "🧠",
    damage: "肝臓の解毒負担が増大。腸内細菌叢を乱し、ホルモンバランスを崩します。",
    recovery: "🍊 果汁100%ジュースや無添加おにぎりへ変更推奨。摂った場合はヨーグルトで腸内環境を補修しましょう。"
  },
  "ソルビン酸": {
    aliases: ["ソルビン酸","ソルビン酸K","ソルビン酸カリウム","ソルビン酸Na","ソルビン酸ナトリウム"],
    organ: "腸内環境 · 肝臓", level: "MEDIUM", color: "#D35400", icon: "🦠",
    damage: "腸内の善玉菌を死滅させ、消化吸収能力が低下。栄養素が腸から吸収されなくなります。",
    recovery: "🥣 食後に乳酸菌サプリかヨーグルトを。オートミール・キウイの食物繊維で腸内環境を整えましょう。"
  },
  "亜硝酸ナトリウム": {
    aliases: ["亜硝酸Na","亜硝酸ナトリウム","亜硝酸塩","亜硝酸"],
    organ: "全身の細胞", level: "HIGH", color: "#C0392B", icon: "☣️",
    damage: "体内で発がん性物質（ニトロソアミン）に変化するリスク。細胞の酸化でリカバリーが遅れます。",
    recovery: "🥝 ビタミンC（キウイ・ブロッコリー）を一緒に摂ることで有害物質の生成を抑制できます。"
  }
};

const SYSTEM_PROMPT = `あなたはプロゴルファー専属の食品添加物分析AIです。
食品の原材料表示を分析し、以下の有害添加物が含まれているか確認します。

【確認対象】
1. リン酸塩系: リン酸、ポリリン酸、メタリン酸、ピロリン酸、リン酸Na/K/Ca、リン酸塩
2. 人工甘味料: アスパルテーム、スクラロース、アセスルファムK/カリウム、サッカリン
3. ソルビン酸系: ソルビン酸、ソルビン酸K/カリウム/Na
4. 亜硝酸塩: 亜硝酸Na/ナトリウム、亜硝酸塩

JSONのみで返答してください（マークダウン・コードブロック・説明文は一切不要）:
{"productName":"商品名（不明なら不明）","imageReadable":true,"detected":[{"name":"添加物名","category":"リン酸塩 または 人工甘味料 または ソルビン酸 または 亜硝酸ナトリウム","exact":"原材料の正確な表記"}]}`;

/* ============================================================
   State
   ============================================================ */
let currentTab     = 'camera';
let imageBase64    = null;
let imageMediaType = 'image/jpeg';

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('text-input').addEventListener('input', updateBtn);
  updateBtn();
});

/* ── タブ切替 ── */
function switchTab(tab) {
  currentTab = tab;
  ['camera','text','history'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
  });
  // 履歴タブでは実行ボタンを隠す
  document.getElementById('btn-analyze').classList.toggle('hidden', tab === 'history');
  if (tab === 'history') renderHistory();
  clearResults();
  updateBtn();
}

/* ── ファイル処理 ── */
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const valid = ['image/jpeg','image/png','image/gif','image/webp'];
  imageMediaType = valid.includes(file.type) ? file.type : 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('upload-zone').classList.add('hidden');
    document.getElementById('preview-zone').classList.remove('hidden');
    clearResults();
    updateBtn();
  };
  reader.readAsDataURL(file);
}

function resetImage() {
  imageBase64 = null;
  document.getElementById('preview-zone').classList.add('hidden');
  document.getElementById('upload-zone').classList.remove('hidden');
  document.getElementById('input-gallery').value = '';
  clearResults();
  updateBtn();
}

/* ── UI ── */
function updateBtn() {
  const ok = currentTab === 'camera'
    ? !!imageBase64
    : document.getElementById('text-input').value.trim().length > 0;
  document.getElementById('btn-analyze').disabled = !ok;
}
function clearResults() {
  document.getElementById('results').classList.add('hidden');
  document.getElementById('error-card').classList.add('hidden');
  document.getElementById('results').innerHTML = '';
}
function showError(msg) {
  const el = document.getElementById('error-card');
  el.textContent = '❌ ' + msg;
  el.classList.remove('hidden');
}

/* ── API 呼び出し ── */
async function analyze() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('btn-analyze').disabled = true;
  clearResults();
  try {
    const messages = currentTab === 'camera' && imageBase64
      ? [{ role:'user', content:[
            { type:'image', source:{ type:'base64', media_type:imageMediaType, data:imageBase64 }},
            { type:'text', text:'この食品の原材料表示を分析してください。JSONのみで返答してください。' }
          ]}]
      : [{ role:'user', content:`以下の原材料を分析してください。JSONのみで返答してください。\n\n原材料: ${document.getElementById('text-input').value.trim()}` }];

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:SYSTEM_PROMPT, messages })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw    = (data.content.find(b=>b.type==='text')?.text||'').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw);
    if (parsed.imageReadable === false) { showError('画像の文字が読み取れませんでした。明るい場所で撮影し直すか、テキスト入力をお試しください。'); return; }
    renderResults(parsed);
  } catch(e) {
    showError(e.message);
  } finally {
    document.getElementById('loading').classList.add('hidden');
    updateBtn();
  }
}

/* ── 結果描画 ── */
function renderResults(parsed) {
  const detected = (parsed.detected||[]).map(item => {
    const m = Object.entries(BLACKLIST).find(([k,v]) =>
      item.category===k || v.aliases.some(a=>(item.exact||'').includes(a)||(item.name||'').includes(a)));
    return m ? {...item,...m[1],categoryKey:m[0]} : item;
  });
  const isClean = detected.length === 0;
  const hasHigh = detected.some(d=>d.level==='HIGH');
  const cls   = isClean ? 'status-clean' : hasHigh ? 'status-high' : 'status-mid';
  const title = isClean ? 'クリーン！安全な食品です' : `要注意添加物 ${detected.length} 種類を検出`;
  const sub   = (parsed.productName && parsed.productName!=='不明') ? `<div class="status-sub">${esc(parsed.productName)}</div>` : '';

  let html = `<div class="status-banner ${cls}">
    <div class="status-icon">${isClean?'✅':'⚠️'}</div>
    <div><div class="status-title">${title}</div>${sub}</div></div>`;

  detected.forEach(item => {
    html += `<div class="additive-card" style="border-left-color:${item.color||'#C0392B'}">
      <div class="add-header">
        <div class="add-icon">${item.icon||'⚠️'}</div>
        <div class="add-meta">
          <div class="add-name" style="color:${item.color||'#C0392B'}">${esc(item.categoryKey||item.category)}</div>
          <div class="add-exact">検出表記：${esc(item.exact)}</div>
        </div>
        <div class="level-badge" style="background:${item.level==='HIGH'?'#C0392B':'#D35400'}">${item.level==='HIGH'?'高リスク':'中リスク'}</div>
      </div>
      <div class="organ-tag">🫀 負担臓器：<strong>${esc(item.organ||'—')}</strong></div>
      <div class="damage-text">🔴 ${esc(item.damage||'内臓への負担が懸念されます。')}</div>
      <div class="recovery-box">
        <div class="recovery-label">⚡ リカバリーアドバイス</div>
        <div class="recovery-text">${esc(item.recovery||'水分を多めに摂り、野菜・果物で栄養補給しましょう。')}</div>
      </div></div>`;
  });

  if (isClean) html += `<div class="clean-card">
    <div class="clean-icon">💚</div>
    <div class="clean-title">この食品は安心して食べられます</div>
    <div class="clean-text">4種類の要注意添加物は検出されませんでした。<br>クリーンな食品選択で最高のパフォーマンスへ！</div></div>`;

  const c = document.getElementById('results');
  c.innerHTML = html;
  c.classList.remove('hidden');
  c.scrollIntoView({behavior:'smooth',block:'start'});

  // 履歴に保存
  saveHistory(parsed, detected);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ============================================================
   履歴 — localStorage キー: cf_history
   最大30件。新しい順。
   ============================================================ */
const HISTORY_KEY = 'cf_history';
const HISTORY_MAX = 30;

function saveHistory(parsed, detected) {
  const now  = new Date();
  const pad  = n => String(n).padStart(2,'0');
  const date = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;
  const time = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const entry = {
    id:          now.getTime(),
    date, time,
    productName: parsed.productName || '不明',
    inputType:   currentTab,
    isClean:     detected.length === 0,
    detected:    detected.map(d => ({
      categoryKey: d.categoryKey || d.category,
      exact:       d.exact,
      icon:        d.icon  || '⚠️',
      color:       d.color || '#C0392B',
      level:       d.level || 'HIGH',
      organ:       d.organ || '',
      damage:      d.damage || '',
      recovery:    d.recovery || ''
    }))
  };
  let history = loadHistoryRaw();
  history.unshift(entry);
  if (history.length > HISTORY_MAX) history = history.slice(0, HISTORY_MAX);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function loadHistoryRaw() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}

function clearAllHistory() {
  if (!confirm('履歴を全件削除しますか？')) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function deleteHistoryEntry(id) {
  let history = loadHistoryRaw().filter(e => e.id !== id);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function toggleHistDetail(id) {
  const det  = document.getElementById('hdet-' + id);
  const chev = document.getElementById('hchev-' + id);
  if (!det) return;
  const isOpen = det.classList.contains('open');
  det.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function renderHistory() {
  const history = loadHistoryRaw();
  const container = document.getElementById('history-list');

  if (history.length === 0) {
    container.innerHTML = `
      <div class="history-empty">
        <div class="history-empty-icon">📭</div>
        <div class="history-empty-text">まだチェック履歴がありません。<br>写真またはテキストで原材料を分析すると<br>ここに記録されます。</div>
      </div>`;
    return;
  }

  container.innerHTML = history.map(entry => {
    const borderColor = entry.isClean ? '#22C55E'
      : entry.detected.some(d=>d.level==='HIGH') ? '#C0392B' : '#D35400';
    const dotClass    = entry.isClean ? 'dot-clean'
      : entry.detected.some(d=>d.level==='HIGH') ? 'dot-danger' : 'dot-warn';
    const dotIcon     = entry.isClean ? '✅' : '⚠️';

    // バッジ（検出した添加物名）
    const badges = entry.isClean
      ? `<span class="hist-badge hist-badge-clean">クリーン</span>`
      : entry.detected.map(d =>
          `<span class="hist-badge" style="background:${d.color||'#C0392B'}">${esc(d.categoryKey)}</span>`
        ).join('');

    // 詳細部分
    const detailRows = entry.isClean
      ? `<div class="hist-clean-row">💚 要注意添加物は検出されませんでした</div>`
      : entry.detected.map(d => `
          <div class="hist-additive-row">
            <div class="hist-add-icon">${d.icon}</div>
            <div class="hist-add-info">
              <div class="hist-add-name" style="color:${d.color}">${esc(d.categoryKey)}</div>
              <div class="hist-add-exact">検出：${esc(d.exact)}</div>
              ${d.organ ? `<div class="hist-add-exact" style="margin-top:3px">🫀 ${esc(d.organ)}</div>` : ''}
              ${d.recovery ? `<div class="hist-recovery">⚡ ${esc(d.recovery)}</div>` : ''}
            </div>
          </div>`).join('');

    return `
      <div class="hist-card" style="border-left-color:${borderColor}">
        <div class="hist-summary" onclick="toggleHistDetail(${entry.id})">
          <div class="hist-status-dot ${dotClass}">${dotIcon}</div>
          <div class="hist-meta">
            <div class="hist-product">${esc(entry.productName)}</div>
            <div class="hist-date">${entry.date} ${entry.time}　${entry.inputType==='camera'?'📷 写真':'✏️ テキスト'}</div>
            <div class="hist-badges">${badges}</div>
          </div>
          <div class="hist-chevron" id="hchev-${entry.id}">›</div>
        </div>
        <div class="hist-detail" id="hdet-${entry.id}">
          ${detailRows}
          <button class="hist-delete-btn" onclick="deleteHistoryEntry(${entry.id})">🗑 この履歴を削除</button>
        </div>
      </div>`;
  }).join('');
}
</script>
